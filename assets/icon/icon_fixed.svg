<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)" stroke="#4b5563" stroke-width="8"/>
  
  <!-- Icon background circle with slight inner shadow effect -->
  <circle cx="512" cy="512" r="400" fill="#1f2937" stroke="#6b7280" stroke-width="2" opacity="0.8"/>
  
  <!-- Main text -->
  <text x="512" y="520" text-anchor="middle" fill="white" font-size="140" font-family="Arial, sans-serif" font-weight="bold" filter="url(#shadow)">
    Y-City
  </text>
  
  <!-- Plus symbol with emerald color -->
  <text x="512" y="660" text-anchor="middle" fill="#10b981" font-size="120" font-family="Arial, sans-serif" font-weight="bold" filter="url(#shadow)">
    +
  </text>
  
  <!-- Subtle accent lines -->
  <line x1="200" y1="512" x2="300" y2="512" stroke="#10b981" stroke-width="6" opacity="0.6"/>
  <line x1="724" y1="512" x2="824" y2="512" stroke="#10b981" stroke-width="6" opacity="0.6"/>
  <line x1="512" y1="200" x2="512" y2="300" stroke="#10b981" stroke-width="6" opacity="0.6"/>
  <line x1="512" y1="724" x2="512" y2="824" stroke="#10b981" stroke-width="6" opacity="0.6"/>
</svg>